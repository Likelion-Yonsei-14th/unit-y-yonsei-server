# ============================================================================
# 스테이징(dev) 프로파일 설정 — 빈 스텁
# ============================================================================
# 활성화 방법:
#   ./gradlew bootRun --args='--spring.profiles.active=dev'
#   또는 환경변수: SPRING_PROFILES_ACTIVE=dev
#
# 현재 상태:
#   실제 스테이징 인프라(클라우드 / RDS / 도메인 등)가 결정되지 않아 빈 스텁으로 둔다.
#   별도 오버라이드가 없으면 application.yaml 의 환경변수 디폴트가 그대로 사용된다.
#
# 채워질 시점:
#   - 스테이징 RDS 엔드포인트 결정 → 환경변수 가이드 추가
#   - CORS, 로깅 레벨, 기능 플래그 등 dev/prod 차이가 생기는 시점
#
# 운영(prod) 설정은 application-prod.yaml 참고.
# ============================================================================
