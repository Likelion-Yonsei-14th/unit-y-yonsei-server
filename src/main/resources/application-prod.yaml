springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

server:
  servlet:
    session:
      cookie:
        secure: true
        same-site: none

# 운영 콘솔 로그를 ECS JSON으로 구조화 → Alloy가 tail → Loki 라벨 파싱(| json).
# logback-spring.xml 의 springProfile=prod 가 structured-console-appender 를 선택하고,
# 이 포맷 값(ecs)을 CONSOLE_LOG_STRUCTURED_FORMAT 로 주입한다.
# 로컬/개발(base·dev 프로파일)은 사람이 읽는 평문 콘솔 로그를 유지한다.
logging:
  structured:
    format:
      console: ecs