spring:
  application:
    name: daedongje

  # ===== DataSource =====
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/daedongje?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:daedongje}
    password: ${DB_PASSWORD:daedongje}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:3000}

  # ===== JPA =====
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  # ===== Redis =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ===== Session =====
  session:
    store-type: redis
    timeout: 86400s
    redis:
      namespace: daedongje:session

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# ===== Server =====
server:
  servlet:
    session:
      cookie:
        name: DDJ_ADMIN_SESSION
        http-only: true
        secure: false
        same-site: lax