spring:
  application:
    name: daedongje

  # ===== DataSource =====
  # 환경변수 미지정 시 로컬 docker-compose MySQL 기본값 사용.
  # 운영(RDS) 등에선 DB_URL/DB_USERNAME/DB_PASSWORD 환경변수로 오버라이드.
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/daedongje?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:daedongje}
    password: ${DB_PASSWORD:daedongje}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:3000}

  # ===== JPA =====
  jpa:
    hibernate:
      # 스키마 변경은 Flyway가 담당. JPA는 엔티티-스키마 일치성만 검증.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false       # 트랜잭션 누수 방지 (커넥션이 view 렌더 시점까지 유지되는 것 차단)
    show-sql: ${JPA_SHOW_SQL:false}

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # 기존 DB에 처음 적용 시 베이스라인 자동 생성
    baseline-version: 0
    validate-on-migrate: true   # 적용된 마이그레이션 체크섬 검증

  # ===== Redis =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ===== Session =====
  session:
    store-type: ${SPRING_SESSION_STORE_TYPE:redis}
    timeout: 86400s
    redis:
      namespace: ${SPRING_SESSION_REDIS_NAMESPACE:daedongje:session}


server:
  servlet:
    session:
      cookie:
        name: DDJ_ADMIN_SESSION
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}


springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:daedongje-s3}
    region: ${AWS_S3_REGION:ap-northeast-2}
    image-base-url: ${AWS_S3_IMAGE_BASE_URL:https://daedongje-s3.s3.ap-northeast-2.amazonaws.com}
    presigned-url-expiration-minutes: ${AWS_S3_PRESIGNED_URL_EXPIRATION_MINUTES:5}