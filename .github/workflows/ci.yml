name: CI

on:
  pull_request:
    branches: [dev, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.gitignore'
      - '.gitattributes'
  push:
    branches: [dev, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.gitignore'
      - '.gitattributes'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ (github.head_ref || github.ref_name) != 'dev' && (github.head_ref || github.ref_name) != 'main' }}

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (JDK 17)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for duplicate Flyway versions
        run: |
          duplicates=$(find src/main/resources/db/migration -name 'V*__*.sql' | awk -F'/' '{print $NF}' | awk -F'__' '{print $1}' | sort | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "Duplicate Flyway versions found:"
            echo "$duplicates"
            exit 1
          fi

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile main + test sources
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7
