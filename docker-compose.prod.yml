services:
  app:
    image: ${DOCKER_IMAGE}
    container_name: unit-y-server
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: unit-y-redis
    command: redis-server --appendonly no
    restart: unless-stopped