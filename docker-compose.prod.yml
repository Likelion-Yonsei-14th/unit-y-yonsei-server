services:
  app:
    image: ${DOCKER_IMAGE}
    container_name: unit-y-server
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: unit-y-redis
    command: redis-server --appendonly no
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.16.1  # 재현성 위해 고정. 업그레이드 시 https://hub.docker.com/r/grafana/alloy/tags 확인 후 태그 변경
    container_name: unit-y-alloy
    env_file:
      - .env
    volumes:
      - ./deploy/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    depends_on:
      - app
    restart: unless-stopped

volumes:
  alloy-data: